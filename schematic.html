<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Schematics</title>
        <link rel="stylesheet" href="schematic.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="shortcut icon" type="image/png" href="IMAGES/ICON.png">
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    </head>
    <body>
        <section class="header">
           <nav>
                <a href="index.html"><img src="IMAGES/LOGO.png" alt="Smart LoBo Logo"></a>
                <div class="nav-links-a" id="navLinks">
                    <i class="fa-solid fa-circle-xmark" onclick="hideMenu()"></i>
                    <ul>
                        <li><a href="index.html">HOME</a></li>
                        <li><a href="specs.html">SPECIFICATION</a></li>
                        <li><a href="schematic.html">SCHEMATIC DIAGRAM</a></li>
                        <li><a href="researchers.html">ABOUT THE RESEARCHERS</a></li>
                    </ul>
                </div>
                <i class="fa-solid fa-bars" onclick="showMenu()"></i>
           </nav>

        <section class="text-box">
            <h1>Schematic Diagram</h1>
            <p>Below are the schematic diagrams and codes for the Smart LoBo Training Kit:</p>
        </section>

        <div class="schematics-container">
            <div class="schematic">
                <h2>Main Board</h2>
                <img src="IMAGES/Main Board.png" alt="Schematic 1" class="schematic-img hoverable" onclick="showModal('IMAGES/Main Board.png')">
            </div>
            <div class="schematic">
                <h2>Logic Gates</h2>
                <img src="IMAGES/gates.jpg" alt="Schematic 2" class="schematic-img hoverable" onclick="showModal('IMAGES/gates.jpg')">
            </div>
        </div>

        <div id="imageModal" class="modal">
            <span class="close" onclick="closeModal()">&times;</span>
            <img class="modal-content" id="fullImage">
        </div>

        <div class="mode-links">
            <a href="Smart Logic Board/esp32_practice_mode/esp32_practice_mode.ino" class="mode-btn" download="esp32_practice_mode.ino">Training Mode Code</a>
            <a href="Smart Logic Board/esp8266_iot/esp8266_iot.ino" class="mode-btn" download="esp8266_iot.ino">IoT Mode Code</a>
            <a href="Smart Logic Board/CUSTOM_SYMBOL/CUSTOM_SYMBOL.ino" class="mode-btn" download="CUSTOM_SYMBOL.ino">Custom Symbol Code</a>
            <a href="Smart Logic Board/I2C_test/I2C_test.ino" class="mode-btn" download="I2C_test.ino">I2C Test Code</a>
        </div>

        <script>
            const navLinks = document.getElementById("navLinks");
            function showMenu() {
                navLinks.style.right = "0";
            }
            function hideMenu() {
                navLinks.style.right = "-200px";
            }
        </script>
        <script>
            function showModal(imageSrc) {
                const modal = document.getElementById("imageModal");
                const fullImage = document.getElementById("fullImage");
                fullImage.src = imageSrc;
                modal.style.display = "block";
            }
            function closeModal() {
                const modal = document.getElementById("imageModal");
                modal.style.display = "none";
            }
        </script>
    </body>
</html>
